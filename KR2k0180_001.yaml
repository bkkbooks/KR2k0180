body:
  text: 庾仲雍湘州記初學記引一事零陵山有石燕遇雨則飛雨止還化為石也卷一太平御覽卷九太平御覽引二事應陽縣蔡子池南有石臼云是蔡倫造紙臼也卷五十七昔秦皇欲入湘觀衡山而遇風浪溺敗至此山而免因號為君山卷四十九嶽陽風土記引一事君山上有美酒數斗得飲之即不死為神仙漢武帝聞之齊居七日遣欒巴將童男女數十人來求之纍得酒進御未飲東方朔在旁竊飲之帝大怒將殺之朔曰使酒有驗殺臣亦不死無驗安用酒為帝笑而釋之
